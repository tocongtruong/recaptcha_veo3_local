services:
  captcha-veo3-local:
    container_name: captcha-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3000}
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    # Share network with API so Cloudflare origin http://localhost:3000 works reliably
    network_mode: "service:captcha-veo3-local"
    restart: unless-stopped
    depends_on:
      - captcha-veo3-local
